  <rect x="132" y="152" width="78" height="26" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="150" y="170" class="t xs">Open</text>
  <rect x="48" y="186" width="246" height="24" rx="5" fill="#dbeafe"/>
  <text x="58" y="202" class="t xs" fill="#1d4ed8">transport-example.ttl</text>
  <rect x="48" y="226" width="246" height="470" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="58" y="252" class="t xs">@prefix ex: &lt;https://example.org/transport/&gt; .</text>
  <text x="58" y="278" class="t xs">@prefix schema: &lt;https://schema.org/&gt; .</text>
  <text x="58" y="304" class="t xs">ex:route-42 a schema:BusTrip ;</text>
  <text x="58" y="330" class="t xs">  schema:name "Airport Express"@en ;</text>
  <text x="58" y="356" class="t xs">  schema:distance "12.4"^^xsd:decimal ;</text>
  <text x="58" y="382" class="t xs">  schema:amenityFeature ( "Wi-Fi" ... ) .</text>

  <rect x="350" y="92" width="896" height="50" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="392" y="124" class="t xs" fill="#4f46e5">Inspect</text>
  <text x="536" y="124" class="t xs">Validate</text>
  <text x="690" y="124" class="t xs">Convert</text>
  <text x="862" y="124" class="t xs">Visualize</text>
  <line x1="827" y1="140" x2="944" y2="140" stroke="#4f46e5" stroke-width="3"/>

