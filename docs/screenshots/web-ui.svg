<svg width="1280" height="760" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LOD Workbench web UI preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <style>
      .t { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #1f2937; }
      .m { fill: #64748b; font-size: 16px; }
      .s { fill: #0f172a; font-size: 18px; font-weight: 700; }
      .xs { fill: #64748b; font-size: 13px; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="32" y="28" width="1216" height="704" rx="20" fill="url(#panel)" filter="url(#shadow)"/>

  <rect x="32" y="28" width="1216" height="64" rx="20" fill="#ffffff"/>
  <text x="62" y="68" class="t" font-size="22" font-weight="700">LOD Workbench</text>
  <rect x="214" y="44" width="52" height="24" rx="8" fill="#eef2ff"/>
  <text x="228" y="61" class="t" font-size="13" font-weight="700" fill="#4f46e5">RDF</text>
  <circle cx="1187" cy="60" r="4" fill="#22c55e"/>
