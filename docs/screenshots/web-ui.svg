  <text x="656" y="195" class="t" font-size="28" font-weight="700">18</text>
  <text x="646" y="215" class="t xs">predicates</text>
  <rect x="742" y="164" width="112" height="68" rx="14" fill="#fff7ed"/>
  <text x="782" y="195" class="t" font-size="28" font-weight="700">36</text>
  <text x="772" y="215" class="t xs">objects</text>

  <rect x="370" y="256" width="852" height="444" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  <path d="M 620 460 L 700 350 L 816 392 L 910 290 L 1018 360 L 910 468 L 792 530 L 684 520 Z" fill="none" stroke="#cbd5e1" stroke-width="3"/>
