  <circle cx="816" cy="392" r="24" fill="#4f46e5"/>
  <circle cx="910" cy="290" r="24" fill="#d97706"/>
  <circle cx="1018" cy="360" r="28" fill="#059669"/>
  <circle cx="910" cy="468" r="28" fill="#059669"/>
  <circle cx="792" cy="530" r="28" fill="#059669"/>
  <circle cx="684" cy="520" r="28" fill="#059669"/>
  <rect x="570" y="405" width="100" height="32" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="593" y="426" class="t xs">route-42</text>
  <rect x="740" y="332" width="116" height="32" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="760" y="353" class="t xs">BusTrip</text>
  <rect x="980" y="344" width="130" height="32" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1000" y="365" class="t xs">Airport Express</text>
  <rect x="1070" y="450" width="128" height="32" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1090" y="471" class="t xs">Metro Transit</text>
  <rect x="770" y="494" width="108" height="32" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="789" y="515" class="t xs">Wi-Fi</text>

